site_name: Breezy — Documentation
site_description: Documentation technique du réseau social Breezy
theme:
  name: material
  language: fr
  palette:
    primary: indigo
  features:
    - navigation.sections
    - content.code.copy
nav:
  - Accueil: index.md
  - Architecture:
    - Vue d'ensemble: architecture/vue-ensemble.md
    - Communication inter-services: architecture/communication.md
    - Flux de données: architecture/flux-donnees.md
    - Déploiement: architecture/deploiement.md
  - Services:
    - API Gateway: services/gateway.md
    - Auth Service: services/auth-service.md
    - User Service: services/user-service.md
    - Post Service: services/post-service.md
    - Profil Service: services/profil-service.md
    - Frontend: services/frontend.md
  - Données:
    - PostgreSQL: donnees/postgresql.md
    - MongoDB: donnees/mongodb.md
  - API:
    - Routes complètes: api/routes.md
  - Sécurité:
    - Authentification: securite/authentification.md
    - Secrets & configuration: securite/secrets-configuration.md
  - Fonctionnalités:
    - Couverture Fx1→Fx23: fonctionnalites/couverture.md
  - Soutenance:
    - Questions générales: soutenance/questions.md
    - Questions par membre: soutenance/par-membre.md
    - Limites & évolutions: soutenance/limites.md
  - Journal des modifications: CHANGELOG.md
markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
